<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>边框实验室</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="control-panel">
      <div class="control-panel-scroll">
      <div class="brand-block">
        <p class="eyebrow">Border Lab</p>
        <div class="brand-title-row">
          <h1>边框实验室</h1>
          <span class="design-credit">Crafted by Xiaohui</span>
        </div>
        <p class="subtitle">用于为照片添加边框、读取常见 EXIF 信息，并导出带标注的成片。</p>
      </div>

      <section class="panel-section panel-span-2">
        <label class="upload-card" for="imageInput">
          <span class="upload-title">导入照片</span>
          <span class="upload-hint">支持 JPG / JPEG / PNG / WebP，JPEG 可读取常见 EXIF</span>
        </label>
        <input id="imageInput" type="file" accept="image/jpeg,image/png,image/webp" hidden>
      </section>

      <section class="panel-section">
        <div class="field-label-row">
          <label for="borderRange">四周留白</label>
          <span id="borderValue">30%</span>
        </div>
        <input id="borderRange" type="range" min="0" max="100" value="30" step="0.1">
      </section>

      <section class="panel-section">
        <div class="field-label-row">
          <label for="bottomRange">底部说明区</label>
          <span id="bottomValue">30%</span>
        </div>
        <input id="bottomRange" type="range" min="0" max="100" value="30" step="0.1">
      </section>

      <section class="panel-section">
        <label class="field-label" for="paperColor">边框颜色</label>
        <input id="paperColor" type="color" value="#ffffff">
      </section>

      <section class="panel-section">
        <label class="field-label" for="textColor">文字颜色</label>
        <input id="textColor" type="color" value="#4b433d">
      </section>

      <section class="panel-section panel-span-2">
        <label class="field-label" for="headlineInput">主标题</label>
        <input id="headlineInput" class="text-input" type="text" placeholder="例如：呼兰站人行桥，哈尔滨市呼兰区">
      </section>

      <section class="panel-section panel-span-2">
        <label class="field-label" for="sublineInput">副标题</label>
        <input id="sublineInput" class="text-input" type="text" placeholder="例如：NIKON Zfc">
      </section>

      <section class="panel-row-3 panel-span-2">
        <div class="panel-section panel-section-inline">
          <div class="field-label-row">
            <label for="headlineSizeRange">主标题大小</label>
            <span id="headlineSizeValue">65%</span>
          </div>
          <input id="headlineSizeRange" type="range" min="0" max="100" value="65">
        </div>

        <div class="panel-section panel-section-inline">
          <div class="field-label-row">
            <label for="headlineOffsetRange">主标题位置</label>
            <span id="headlineOffsetValue">25%</span>
          </div>
          <input id="headlineOffsetRange" type="range" min="0" max="100" value="25">
        </div>

        <div class="panel-section panel-section-inline">
          <label class="field-label" for="headlineFontSelect">主标题字体</label>
          <select id="headlineFontSelect" class="select-input">
            <option value="yahei" selected>微软雅黑</option>
            <option value="misans">MiSans</option>
            <option value="angie">Angie Sans Std</option>
            <option value="times">Times New Roman</option>
            <option value="system">System Sans</option>
          </select>
        </div>
      </section>

      <section class="panel-row-3 panel-span-2">
        <div class="panel-section panel-section-inline">
          <div class="field-label-row">
            <label for="sublineSizeRange">副标题大小</label>
            <span id="sublineSizeValue">65%</span>
          </div>
          <input id="sublineSizeRange" type="range" min="0" max="100" value="65">
        </div>

        <div class="panel-section panel-section-inline">
          <div class="field-label-row">
            <label for="sublineOffsetRange">副标题位置</label>
            <span id="sublineOffsetValue">45%</span>
          </div>
          <input id="sublineOffsetRange" type="range" min="0" max="100" value="45">
        </div>

        <div class="panel-section panel-section-inline">
          <label class="field-label" for="sublineFontSelect">副标题字体</label>
          <select id="sublineFontSelect" class="select-input">
            <option value="yahei">微软雅黑</option>
            <option value="misans">MiSans</option>
            <option value="angie">Angie Sans Std</option>
            <option value="times" selected>Times New Roman</option>
            <option value="system">System Sans</option>
          </select>
        </div>
      </section>

      <section id="infoControlsRow" class="panel-row-3 panel-span-2">
        <div class="panel-section panel-section-inline">
          <div class="field-label-row">
            <label for="infoSizeRange">信息大小</label>
              <span id="infoSizeValue">50%</span>
          </div>
          <input id="infoSizeRange" type="range" min="0" max="100" value="50">
        </div>

        <div class="panel-section panel-section-inline">
          <div class="field-label-row">
            <label for="infoOffsetRange">信息位置</label>
            <span id="infoOffsetValue">62%</span>
          </div>
          <input id="infoOffsetRange" type="range" min="0" max="100" value="62">
        </div>

        <div class="panel-section panel-section-inline">
          <label class="field-label" for="infoFontSelect">信息字体</label>
          <select id="infoFontSelect" class="select-input">
            <option value="yahei">微软雅黑</option>
            <option value="misans">MiSans</option>
            <option value="angie">Angie Sans Std</option>
            <option value="times" selected>Times New Roman</option>
            <option value="system">System Sans</option>
          </select>
        </div>
      </section>

      <section class="panel-section toggles panel-span-2">
        <label class="toggle-row">
          <input id="useExifDate" type="checkbox" checked>
          <span>主标题自动追加拍摄日期</span>
        </label>
        <label class="toggle-row">
          <input id="useExifCamera" type="checkbox" checked>
          <span>副标题自动追加镜头信息</span>
        </label>
        <label class="toggle-row panel-span-2">
          <input id="exportRounded" type="checkbox">
          <span>导出圆角版本（PNG）</span>
        </label>
      </section>

      <section class="panel-section panel-span-2">
        <div class="field-label-row">
          <label for="cornerRadiusRange">圆角大小</label>
          <span id="cornerRadiusValue">50%</span>
        </div>
        <input id="cornerRadiusRange" type="range" min="0" max="100" value="50" step="1">
      </section>

        <section class="panel-section action-row panel-span-2">
          <button id="exportButton" class="action-button primary" type="button">导出 JPG</button>
          <button id="resetButton" class="action-button secondary" type="button">恢复默认</button>
        </section>
      </div>
    </aside>

    <main class="stage-panel">
      <section id="dropZone" class="preview-shell">
        <div class="panel-header">
          <span class="preview-heading">实时预览</span>
          <div class="preview-toolbar">
            <button id="clearPhotoButton" class="preview-tool-button preview-icon-button" type="button" aria-label="删除照片" title="删除照片">
              <span class="trash-icon" aria-hidden="true"></span>
            </button>
            <div class="quality-control export-size-control">
              <label class="preview-toolbar-label" for="exportSizeSelect">最长边</label>
              <select id="exportSizeSelect">
                <option value="original">原图</option>
                <option value="4096">4096px</option>
                <option value="3200">3200px</option>
                <option value="2560">2560px</option>
                <option value="2048">2048px</option>
                <option value="1600">1600px</option>
              </select>
            </div>
            <div id="exportQualityControl" class="quality-control">
              <label class="preview-toolbar-label" for="exportQualityRange">导出质量</label>
              <input id="exportQualityRange" type="range" min="10" max="100" value="100">
              <span id="exportQualityValue">100%</span>
            </div>
            <span id="imageMetaLabel" class="preview-meta-label">未载入照片</span>
          </div>
        </div>
        <div id="canvasStage" class="canvas-stage">
          <div id="canvasFrame" class="canvas-frame">
            <canvas id="previewCanvas" width="1200" height="900"></canvas>
            <button id="emptyState" class="empty-state" type="button">
              <span>拖入照片或点击左侧导入</span>
              <small>支持格式：JPG / JPEG / PNG / WebP</small>
            </button>
          </div>
        </div>

        <section class="template-selector">
          <div class="template-header">边框选择</div>
          <div id="templateList" class="template-list">
            <button class="template-card active" data-template="classic" type="button">
              <span class="template-thumb template-classic">
                <span class="template-classic-photo"></span>
                <span class="template-classic-title"></span>
                <span class="template-classic-subtitle"></span>
                <span class="template-classic-meta"></span>
              </span>
              <strong>横屏白框</strong>
            </button>
            <button class="template-card" data-template="classicAlt" type="button">
              <span class="template-thumb template-classic template-classic-alt">
                <span class="template-classic-photo"></span>
                <span class="template-classic-title"></span>
                <span class="template-classic-subtitle"></span>
                <span class="template-classic-meta"></span>
              </span>
              <strong>竖屏白框</strong>
            </button>
            <button class="template-card" data-template="galleryDark" type="button">
              <span class="template-thumb template-dark">
                <span class="template-dark-stage"></span>
                <span class="template-dark-photo"></span>
                <span class="template-dark-title"></span>
                <span class="template-dark-meta"></span>
              </span>
              <strong>横屏壹印</strong>
            </button>
            <button class="template-card" data-template="galleryDarkPortrait" type="button">
              <span class="template-thumb template-dark template-dark-portrait">
                <span class="template-dark-stage"></span>
                <span class="template-dark-photo"></span>
                <span class="template-dark-title"></span>
                <span class="template-dark-meta"></span>
              </span>
              <strong>竖屏壹印</strong>
            </button>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
